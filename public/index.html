<!DOCTYPE html>
<html>
<head>
    <title>Coletor - Teste</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        input, textarea, select {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        button {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background: #2563eb;
        }
        .item {
            border-bottom: 1px solid #eee;
            padding: 10px 0;
        }
        .delete {
            background: #ef4444;
            margin-left: 10px;
        }
        .delete:hover {
            background: #dc2626;
        }
        small {
            color: gray;
            display: block;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>📦 Coletor</h1>
        <p>Salve suas ideias e links rapidamente</p>
    </div>

    <div class="card">
        <h3>➕ Adicionar item</h3>
        <input type="text" id="conteudo" placeholder="Digite um link, ideia ou anotação...">
        <select id="tipo">
            <option value="TEXTO">📝 Texto</option>
            <option value="LINK">🔗 Link</option>
            <option value="IDEIA">💡 Ideia</option>
        </select>
        <button onclick="salvarItem()">Salvar</button>
    </div>

    <div class="card">
        <h3>📋 Seus itens</h3>
        <div id="lista"></div>
    </div>

    <script>
        const API = 'http://localhost:5000/api';
        
        async function carregarItens() {
            const response = await fetch(`${API}/items`);
            const data = await response.json();
            const lista = document.getElementById('lista');
            
            if (data.itens.length === 0) {
                lista.innerHTML = '<p style="color: gray;">Nenhum item ainda. Adicione algo!</p>';
                return;
            }
            
            lista.innerHTML = data.itens.map(item => `
                <div class="item">
                    <strong>${item.tipo}</strong> - ${item.conteudo}
                    <small>${new Date(item.criadoEm).toLocaleString()}</small>
                    <button class="delete" onclick="deletarItem(${item.id})">Excluir</button>
                </div>
            `).join('');
        }
        
        async function salvarItem() {
            const conteudo = document.getElementById('conteudo').value;
            const tipo = document.getElementById('tipo').value;
            
            if (!conteudo) {
                alert('Digite algo!');
                return;
            }
            
            await fetch(`${API}/items`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ conteudo, tipo })
            });
            
            document.getElementById('conteudo').value = '';
            carregarItens();
        }
        
        async function deletarItem(id) {
            await fetch(`${API}/items/${id}`, { method: 'DELETE' });
            carregarItens();
        }
        
        carregarItens();
        setInterval(carregarItens, 2000);
    </script>
</body>
</html>
